*{
    margin:0;

body{

    color:white;
    text-align:center;
    padding:50px 20px;
}

h1{
    font-size:48px;
    color:#00eaff;
    text-shadow:0 0 25px #00eaff;

}

.card{
    max-width:900px;
    margin:auto;
    background:rgba(255,255,255,.05);
    border-radius:20px;
    padding:40px;
    box-shadow:0 20px 50px rgba(0,0,0,.6);
    line-height:1.9;
    font-size:20px;
}

.card h2{
    color:#00eaff;
    margin-bottom:25px;
    font-size:32px;
}

.card img{
    width:100%;
    max-width:700px;
    border-radius:15px;
    margin:20px 0;
    box-shadow:0 0 25px rgba(0,234,255,.3);
}

.text-box{
    margin-top:30px;
}

.back{
    display:inline-block;
    margin-top:50px;
    padding:14px 32px;
    background:#00eaff;
    color:black;
    border-radius:12px;
    font-weight:600;
    text-decoration:none;
    box-shadow:0 0 20px rgba(0,234,255,.6);
    transition:.3s;
}

.back:hover{
    transform:scale(1.1);
}

footer{
    margin-top:60px;
    opacity:.5;
    font-size:14px;
}
